<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健身紀錄 (V15.4完美版)</title>
    
    <!-- PWA 設定 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .bg-gradient-brand { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .dark .bg-gradient-brand { background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%); }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
    <div id="root">
        <div class="min-h-screen flex flex-col items-center justify-center text-slate-400">
            <svg class="w-10 h-10 mb-2 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p>載入 V15.4 完美版...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const formatDate = (date) => {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        // 全域部位對照表
        const BODY_PART_LABELS = { 'chest': '胸', 'back': '背', 'legs': '腿', 'shoulders': '肩', 'other': '其他' };

        // --- Icons (加上 shrink-0 確保圖示永遠不會被擠壓變形) ---
        const Icon = ({ path, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`shrink-0 ${className || ''}`}>{path}</svg>
        );

        const Icons = {
            Activity: (p) => <Icon {...p} path={<polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />} />,
            Calendar: (p) => <Icon {...p} path={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></>} />,
            Plus: (p) => <Icon {...p} path={<><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>} />,
            History: (p) => <Icon {...p} path={<><path d="M3 3v5h5" /><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8" /><path d="M12 7v5l4 2" /></>} />,
            Save: (p) => <Icon {...p} path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></>} />,
            Dumbbell: (p) => <Icon {...p} path={<><path d="m6.5 6.5 11 11" /><path d="m21 21-1-1" /><path d="m3 3 1 1" /><path d="m18 22 4-4" /><path d="m2 6 4-4" /><path d="m3 10 7-7" /><path d="m14 21 7-7" /></>} />,
            ArrowUpRight: (p) => <Icon {...p} path={<><line x1="7" y1="17" x2="17" y2="7" /><polyline points="7 7 17 7 17 17" /></>} />,
            ClipboardList: (p) => <Icon {...p} path={<><rect x="8" y="2" width="8" height="4" rx="1" ry="1" /><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" /><path d="M12 11h4" /><path d="M12 16h4" /><path d="M8 11h.01" /><path d="M8 16h.01" /></>} />,
            Trash2: (p) => <Icon {...p} path={<><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></>} />,
            Timer: (p) => <Icon {...p} path={<><line x1="10" y1="2" x2="14" y2="2" /><line x1="12" y1="14" x2="15" y2="11" /><circle cx="12" cy="14" r="8" /></>} />,
            Flame: (p) => <Icon {...p} path={<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.1.2-2.2.5-3z" />} />,
            Settings: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></>} />,
            Download: (p) => <Icon {...p} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></>} />,
            Upload: (p) => <Icon {...p} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></>} />,
            AlertCircle: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></>} />,
            CalendarDays: (p) => <Icon {...p} path={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /><path d="M8 14h.01" /><path d="M12 14h.01" /><path d="M16 14h.01" /><path d="M8 18h.01" /><path d="M12 18h.01" /><path d="M16 18h.01" /></>} />,
            Footprints: (p) => <Icon {...p} path={<><path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 11 3.8 11 8c0 2.85-1.67 4.24-3 6.62-1.34 2.37-1.5 4.23-1.5 5.38" /><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 13 7.8 13 12c0 2.85 1.67 4.24 3 6.62 1.34 2.37 1.5 4.23 1.5 5.38" /></>} />,
            Sun: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></>} />,
            Moon: (p) => <Icon {...p} path={<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />} />,
            ChevronLeft: (p) => <Icon {...p} path={<polyline points="15 18 9 12 15 6" />} />,
            ChevronRight: (p) => <Icon {...p} path={<polyline points="9 18 15 12 9 6" />} />,
            Chart: (p) => <Icon {...p} path={<><line x1="12" y1="20" x2="12" y2="10" /><line x1="18" y1="20" x2="18" y2="4" /><line x1="6" y1="20" x2="6" y2="16" /></>} />,
            Check: (p) => <Icon {...p} path={<polyline points="20 6 9 17 4 12" />} />,
            Play: (p) => <Icon {...p} path={<polygon points="5 3 19 12 5 21 5 3" />} />,
        };

        const ChartView = ({ logs, isDarkMode }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const [selectedExercise, setSelectedExercise] = useState('');

            const exercises = useMemo(() => [...new Set(logs.map(l => l.exercise))].sort(), [logs]);

            useEffect(() => {
                if (exercises.length > 0 && !selectedExercise) setSelectedExercise(exercises[0]);
            }, [exercises]);

            useEffect(() => {
                if (!selectedExercise || !chartRef.current) return;
                const targetLogs = logs.filter(l => l.exercise === selectedExercise).sort((a, b) => new Date(a.date) - new Date(b.date));
                if (targetLogs.length === 0) return;

                const logsByDate = {};
                targetLogs.forEach(l => {
                    const d = l.date;
                    if (!logsByDate[d]) logsByDate[d] = [];
                    logsByDate[d].push(l);
                });

                const labels = Object.keys(logsByDate).sort();
                let data = [], label = '', borderColor = '#3b82f6';

                const firstLog = targetLogs[0];
                if (firstLog.type === 'strength' || firstLog.type === 'interval') {
                    label = '最大重量 (kg)';
                    data = labels.map(d => Math.max(...logsByDate[d].map(l => l.weight || 0)));
                    if (firstLog.type === 'interval') borderColor = '#9333ea';
                } else {
                    label = '總時間 (min)';
                    data = labels.map(d => logsByDate[d].reduce((sum, l) => sum + (l.duration || 0), 0));
                    borderColor = '#f97316';
                }

                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels.map(d => d.slice(5)),
                        datasets: [{ label, data, borderColor, backgroundColor: isDarkMode ? 'rgba(255, 255, 255, 0.1)' : 'rgba(59, 130, 246, 0.1)', borderWidth: 3, pointBackgroundColor: isDarkMode ? '#fff' : '#fff', pointBorderColor: borderColor, pointRadius: 5, tension: 0.3, fill: true }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: isDarkMode ? '#cbd5e1' : '#475569' } } },
                        scales: { x: { grid: { display: false }, ticks: { color: isDarkMode ? '#94a3b8' : '#64748b' } }, y: { grid: { color: isDarkMode ? '#334155' : '#e2e8f0' }, ticks: { color: isDarkMode ? '#94a3b8' : '#64748b' }, beginAtZero: true } }
                    }
                });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [selectedExercise, logs, isDarkMode]);

            return (
                <div className="space-y-4 animate-in fade-in duration-300">
                    <div className="bg-white dark:bg-slate-800 p-4 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
                        <label className="text-sm text-slate-500 dark:text-slate-400 mb-2 block font-bold">選擇分析動作</label>
                        <select value={selectedExercise} onChange={(e) => setSelectedExercise(e.target.value)} className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none font-bold text-slate-700">{exercises.map((ex, idx) => <option key={idx} value={ex}>{ex}</option>)}</select>
                    </div>
                    {selectedExercise && <div className="bg-white dark:bg-slate-800 p-4 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 h-80 relative"><canvas ref={chartRef}></canvas></div>}
                    {exercises.length === 0 && <div className="text-center py-20 text-slate-400">尚無數據可分析</div>}
                </div>
            );
        };

        const CalendarView = ({ logs, selectedDate, onSelectDate }) => {
            const [currentMonth, setCurrentMonth] = useState(new Date(selectedDate));
            const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const getFirstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();
            const daysInMonth = getDaysInMonth(currentMonth);
            const firstDay = getFirstDayOfMonth(currentMonth);
            const todayStr = formatDate(new Date());

            const hasLog = (day) => {
                const year = currentMonth.getFullYear();
                const month = String(currentMonth.getMonth() + 1).padStart(2, '0');
                const d = String(day).padStart(2, '0');
                const checkDate = `${year}-${month}-${d}`;
                const dayLogs = logs.filter(l => l.date === checkDate);
                if (dayLogs.length === 0) return null;
                if (dayLogs.some(l => l.type === 'interval')) return 'bg-purple-500';
                if (dayLogs.some(l => l.type === 'cardio')) return 'bg-orange-500';
                return 'bg-blue-500';
            };

            const handlePrevMonth = () => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1));
            const handleNextMonth = () => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1));

            const days = [];
            for (let i = 0; i < firstDay; i++) { days.push(<div key={`empty-${i}`} className="h-10"></div>); }
            for (let d = 1; d <= daysInMonth; d++) {
                const year = currentMonth.getFullYear();
                const month = String(currentMonth.getMonth() + 1).padStart(2, '0');
                const dayStr = String(d).padStart(2, '0');
                const dateStr = `${year}-${month}-${dayStr}`;
                const isSelected = dateStr === selectedDate;
                const isToday = dateStr === todayStr;
                const dotColor = hasLog(d);
                days.push(
                    <button key={d} onClick={() => onSelectDate(dateStr)} className={`h-10 w-full flex flex-col items-center justify-center relative rounded-full transition-all ${isSelected ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700'} ${isToday && !isSelected ? 'border border-blue-400' : ''}`}>
                        <span className="text-sm z-10">{d}</span>
                        {dotColor && !isSelected && <span className={`w-1.5 h-1.5 rounded-full absolute bottom-1.5 ${dotColor}`}></span>}
                    </button>
                );
            }

            return (
                <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 p-4 mb-6">
                    <div className="flex justify-between items-center mb-4 px-2">
                        <button onClick={handlePrevMonth} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full"><Icons.ChevronLeft className="w-5 h-5 text-slate-500" /></button>
                        <h2 className="font-bold text-lg text-slate-800 dark:text-white">{currentMonth.getFullYear()}年 {currentMonth.getMonth() + 1}月</h2>
                        <button onClick={handleNextMonth} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full"><Icons.ChevronRight className="w-5 h-5 text-slate-500" /></button>
                    </div>
                    <div className="grid grid-cols-7 gap-1 text-center mb-2">{['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d} className="text-xs text-slate-400 font-bold">{d}</div>)}</div>
                    <div className="grid grid-cols-7 gap-1">{days}</div>
                </div>
            );
        };

        const LogGroup = ({ logs, onDelete }) => {
            const grouped = useMemo(() => {
                const groups = new Map();
                // 先照 ID(時間戳) 由舊到新排序，確保動作出現的順序是完全依照建立的先後順序
                const sortedLogs = [...logs].sort((a, b) => a.id - b.id);
                sortedLogs.forEach(log => {
                    const key = `${log.exercise}-${log.type}`;
                    if (!groups.has(key)) groups.set(key, { ...log, sets: [] });
                    groups.get(key).sets.push(log);
                });
                return Array.from(groups.values());
            }, [logs]);

            return (
                <div className="space-y-4">
                    {grouped.map((group, idx) => (
                        <div key={idx} className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 overflow-hidden shadow-sm">
                            <div className="p-4 bg-slate-50 dark:bg-slate-700/50 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    {/* 順序數字 Badge */}
                                    <span className="flex items-center justify-center w-6 h-6 rounded-full bg-slate-200 dark:bg-slate-600 text-slate-600 dark:text-slate-300 font-bold text-xs shrink-0">
                                        {idx + 1}
                                    </span>
                                    
                                    <div className={`p-2 rounded-lg shrink-0 ${group.type === 'interval' ? 'bg-purple-100 text-purple-600 dark:bg-purple-900/30 dark:text-purple-400' : group.type === 'cardio' ? 'bg-orange-100 text-orange-600 dark:bg-orange-900/30 dark:text-orange-400' : 'bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400'}`}>
                                        {group.type === 'interval' ? <Icons.Timer className="w-4 h-4"/> : group.type === 'cardio' ? <Icons.Flame className="w-4 h-4"/> : <Icons.Dumbbell className="w-4 h-4"/>}
                                    </div>
                                    <span className="font-bold text-slate-800 dark:text-white truncate">{group.exercise}</span>
                                    {group.bodyPart && <span className="text-xs px-2 py-0.5 rounded bg-slate-200 dark:bg-slate-600 text-slate-600 dark:text-slate-300 shrink-0">{BODY_PART_LABELS[group.bodyPart] || group.bodyPart}</span>}
                                </div>
                            </div>
                            <div className="divide-y divide-slate-100 dark:divide-slate-700">
                                {group.sets.map((set, sIdx) => (
                                    <div key={set.id} className="p-3 flex items-center justify-between text-sm hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors">
                                        <div className="flex items-center gap-4">
                                            <span className="text-slate-400 font-mono w-6 text-center">{sIdx + 1}</span>
                                            <div className="text-slate-700 dark:text-slate-300 font-bold">
                                                {set.type === 'strength' && <>{set.weight}kg <span className="text-slate-400 font-normal mx-1">×</span> {set.reps}下</>}
                                                {set.type === 'cardio' && <>{set.duration}分 <span className="text-slate-400 font-normal mx-1">/</span> {set.distance}km</>}
                                                {set.type === 'interval' && <>{set.weight ? set.weight+'kg | ' : ''}{set.workTime}s/{set.restTime}s</>}
                                            </div>
                                        </div>
                                        <button onClick={() => onDelete(set.id)} className="text-slate-300 hover:text-red-500 p-2"><Icons.Trash2 className="w-4 h-4"/></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        function FitnessApp() {
            const [logs, setLogs] = useState([]);
            const [activeTab, setActiveTab] = useState('record'); 
            const [date, setDate] = useState(formatDate(new Date()));
            
            const [workoutType, setWorkoutType] = useState('strength');
            const [bodyPart, setBodyPart] = useState('chest');
            const [exercise, setExercise] = useState('');
            const [isSessionActive, setIsSessionActive] = useState(false);
            const [currentSets, setCurrentSets] = useState([]); 

            const [historyDate, setHistoryDate] = useState(formatDate(new Date()));
            const [darkMode, setDarkMode] = useState(false);
            const [deleteTargetId, setDeleteTargetId] = useState(null);
            const [isClearingAll, setIsClearingAll] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);
            const [importMsg, setImportMsg] = useState('');
            const fileInputRef = useRef(null);

            useEffect(() => {
                const savedLogs = localStorage.getItem('fitnessLogs');
                if (savedLogs) { try { setLogs(JSON.parse(savedLogs)); } catch (e) { console.error(e); } }
                const isDark = localStorage.getItem('fitnessDarkMode') === 'true';
                setDarkMode(isDark);
                if (isDark) { document.documentElement.classList.add('dark'); updateMetaThemeColor('#0f172a'); } 
                else { updateMetaThemeColor('#2563eb'); }
            }, []);

            const updateMetaThemeColor = (color) => {
                let meta = document.querySelector('meta[name="theme-color"]');
                if (!meta) { meta = document.createElement('meta'); meta.name = "theme-color"; document.head.appendChild(meta); }
                meta.content = color;
            };

            const toggleDarkMode = () => {
                const newMode = !darkMode;
                setDarkMode(newMode);
                localStorage.setItem('fitnessDarkMode', newMode);
                if (newMode) { document.documentElement.classList.add('dark'); updateMetaThemeColor('#0f172a'); } 
                else { document.documentElement.classList.remove('dark'); updateMetaThemeColor('#2563eb'); }
            };

            const availableExercises = useMemo(() => {
                const historyExercises = logs.filter(log => log.bodyPart === bodyPart).map(log => log.exercise);
                return [...new Set(historyExercises)].sort();
            }, [bodyPart, logs]);

            const startSession = () => {
                if(!exercise.trim()) return;
                setIsSessionActive(true);
                const history = logs.filter(l => l.exercise === exercise).sort((a,b) => new Date(b.date) - new Date(a.date));
                const last = history[0];
                const initialSet = {
                    id: Date.now(),
                    weight: last ? last.weight : '', reps: last ? last.reps : '',
                    duration: last ? last.duration : '', distance: last ? last.distance : '',
                    workTime: last ? last.workTime : '', restTime: last ? last.restTime : '',
                    completed: false
                };
                setCurrentSets([initialSet]);
            };

            const addNewSetRow = () => {
                const prevSet = currentSets[currentSets.length - 1];
                setCurrentSets([...currentSets, {
                    id: Date.now(),
                    weight: prevSet ? prevSet.weight : '', reps: prevSet ? prevSet.reps : '',
                    duration: prevSet ? prevSet.duration : '', distance: prevSet ? prevSet.distance : '',
                    workTime: prevSet ? prevSet.workTime : '', restTime: prevSet ? prevSet.restTime : '',
                    completed: false
                }]);
            };

            const updateSet = (index, field, value) => {
                const newSets = [...currentSets];
                newSets[index][field] = value;
                setCurrentSets(newSets);
            };

            const toggleSetCompletion = (index) => {
                const set = currentSets[index];
                if (set.completed) return;
                if (workoutType === 'strength' && (!set.weight && !set.reps)) return;
                
                const newLog = {
                    id: set.id, date, exercise: exercise.trim(), type: workoutType,
                    bodyPart: workoutType === 'strength' ? bodyPart : null,
                    weight: (workoutType === 'strength' || workoutType === 'interval') ? parseFloat(set.weight || 0) : null,
                    reps: workoutType === 'strength' ? parseInt(set.reps || 0) : null,
                    sets: 1,
                    duration: workoutType === 'cardio' ? parseFloat(set.duration || 0) : null,
                    distance: (workoutType === 'cardio' && set.distance) ? parseFloat(set.distance) : null,
                    workTime: workoutType === 'interval' ? parseInt(set.workTime || 0) : null,
                    restTime: workoutType === 'interval' ? parseInt(set.restTime || 0) : null,
                };

                const updatedLogs = [newLog, ...logs];
                setLogs(updatedLogs); localStorage.setItem('fitnessLogs', JSON.stringify(updatedLogs));
                const newSets = [...currentSets]; newSets[index].completed = true; setCurrentSets(newSets);
                setShowSuccess(true); setTimeout(() => setShowSuccess(false), 1500);
            };

            const deleteSetRow = (index) => {
                const set = currentSets[index];
                if (set.completed) {
                    const updatedLogs = logs.filter(l => l.id !== set.id);
                    setLogs(updatedLogs); localStorage.setItem('fitnessLogs', JSON.stringify(updatedLogs));
                }
                setCurrentSets(currentSets.filter((_, i) => i !== index));
            };

            const endSession = () => { setIsSessionActive(false); setExercise(''); setCurrentSets([]); };
            const initiateDelete = (id) => { setDeleteTargetId(id); setIsClearingAll(false); };
            const initiateClearAll = () => { setDeleteTargetId('ALL'); setIsClearingAll(true); };
            const confirmDelete = () => {
                if (isClearingAll) { setLogs([]); localStorage.setItem('fitnessLogs', JSON.stringify([])); } 
                else if (deleteTargetId) { const updated = logs.filter(log => log.id !== deleteTargetId); setLogs(updated); localStorage.setItem('fitnessLogs', JSON.stringify(updated)); }
                setDeleteTargetId(null); setIsClearingAll(false);
            };
            const cancelDelete = () => { setDeleteTargetId(null); setIsClearingAll(false); };
            
            const handleExport = () => {
                const blob = new Blob([JSON.stringify(logs, null, 2)], { type: "application/json" });
                const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `fitness_backup_${formatDate(new Date())}.json`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };
            const handleImportClick = () => fileInputRef.current.click();
            const handleFileChange = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedLogs = JSON.parse(e.target.result);
                        if (Array.isArray(importedLogs)) {
                            const currentIds = new Set(logs.map(l => l.id));
                            const newUniqueLogs = importedLogs.filter(l => !currentIds.has(l.id));
                            if (newUniqueLogs.length === 0) { setImportMsg('資料已存在'); } 
                            else {
                                const mergedLogs = [...logs, ...newUniqueLogs].sort((a, b) => new Date(b.date) - new Date(a.date));
                                setLogs(mergedLogs); localStorage.setItem('fitnessLogs', JSON.stringify(mergedLogs));
                                setImportMsg(`成功匯入 ${newUniqueLogs.length} 筆`);
                            }
                        } else { setImportMsg('格式錯誤'); }
                    } catch (err) { setImportMsg('檔案讀取失敗'); }
                    event.target.value = ''; setTimeout(() => setImportMsg(''), 3000);
                };
                reader.readAsText(file);
            };
            const getLogsByDate = (targetDate) => logs.filter(log => log.date === targetDate);

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans flex flex-col w-full transition-colors duration-300">
                    <header className="bg-gradient-brand text-white p-4 shadow-lg sticky top-0 z-20 transition-all duration-300">
                        <div className="flex items-center justify-between max-w-md mx-auto">
                            <div className="flex items-center gap-2"><Icons.Activity className="w-6 h-6" /><h1 className="text-xl font-bold tracking-wide">
                                {activeTab === 'record' && (isSessionActive ? exercise : '訓練紀錄')}
                                {activeTab === 'history' && '歷史回顧'}
                                {activeTab === 'analysis' && '數據分析'}
                                {activeTab === 'settings' && '資料設定'}
                            </h1></div>
                            {!isSessionActive && <button onClick={toggleDarkMode} className="p-2 rounded-full bg-white/20 hover:bg-white/30 backdrop-blur-sm transition-all active:scale-95">{darkMode ? <Icons.Sun className="w-5 h-5" /> : <Icons.Moon className="w-5 h-5" />}</button>}
                            {isSessionActive && <button onClick={endSession} className="text-sm font-bold bg-white/20 px-3 py-1.5 rounded-lg hover:bg-white/30">結束動作</button>}
                        </div>
                    </header>

                    <main className="flex-1 max-w-md mx-auto w-full p-4 pb-24 overflow-y-auto">
                        {activeTab === 'record' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                {!isSessionActive ? (
                                    <>
                                    <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-sm p-5 border border-slate-100 dark:border-slate-700 transition-colors">
                                        <div className="relative group mb-5">
                                            <div className="absolute left-3 top-3.5 w-5 h-5 text-slate-400"><Icons.Calendar className="w-full h-full" /></div>
                                            <input type="date" required value={date} onChange={(e) => setDate(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" />
                                        </div>
                                        <div className="flex bg-slate-100 dark:bg-slate-700 p-1 rounded-2xl mb-5">
                                            <button type="button" onClick={() => setWorkoutType('strength')} className={`flex-1 py-2.5 text-xs font-bold rounded-xl transition-all flex items-center justify-center ${workoutType === 'strength' ? 'bg-white dark:bg-slate-600 text-blue-600 dark:text-blue-400 shadow-sm' : 'text-slate-400 dark:text-slate-400'}`}><Icons.Dumbbell className="w-4 h-4 mr-1" /> 重訓</button>
                                            <button type="button" onClick={() => setWorkoutType('interval')} className={`flex-1 py-2.5 text-xs font-bold rounded-xl transition-all flex items-center justify-center ${workoutType === 'interval' ? 'bg-white dark:bg-slate-600 text-purple-600 dark:text-purple-400 shadow-sm' : 'text-slate-400 dark:text-slate-400'}`}><Icons.Timer className="w-4 h-4 mr-1" /> 計時</button>
                                            <button type="button" onClick={() => setWorkoutType('cardio')} className={`flex-1 py-2.5 text-xs font-bold rounded-xl transition-all flex items-center justify-center ${workoutType === 'cardio' ? 'bg-white dark:bg-slate-600 text-orange-500 dark:text-orange-400 shadow-sm' : 'text-slate-400 dark:text-slate-400'}`}><Icons.Flame className="w-4 h-4 mr-1" /> 有氧</button>
                                        </div>
                                        {workoutType === 'strength' && (
                                            <div className="flex gap-2 overflow-x-auto hide-scrollbar pb-1 mb-4">
                                                {Object.keys(BODY_PART_LABELS).map(key => (
                                                    <button key={key} type="button" onClick={() => setBodyPart(key)} className={`px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all border ${bodyPart === key ? 'bg-blue-600 border-blue-600 text-white shadow-md shadow-blue-200 dark:shadow-none' : 'bg-white dark:bg-slate-700 text-slate-500 dark:text-slate-300 border-slate-200 dark:border-slate-600'}`}>{BODY_PART_LABELS[key]}</button>
                                                ))}
                                            </div>
                                        )}
                                        <div className="relative group mb-4">
                                            <input type="text" list="exercise-list" placeholder="輸入動作名稱 (如: 深蹲)..." 
                                                value={exercise} onChange={(e) => setExercise(e.target.value)}
                                                className="w-full px-4 py-3.5 bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none placeholder:text-slate-400 transition-all font-bold text-center text-lg" 
                                            />
                                            {workoutType === 'strength' && <datalist id="exercise-list">{availableExercises.map((ex, idx) => <option key={idx} value={ex} />)}</datalist>}
                                        </div>
                                        <button 
                                            onClick={startSession} 
                                            disabled={!exercise.trim()}
                                            className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 dark:shadow-none disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center text-lg"
                                        >
                                            <Icons.Play className="w-5 h-5 mr-2 fill-current" /> 開始訓練
                                        </button>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        <h3 className="text-xs font-bold text-slate-400 px-1 uppercase tracking-wider">今日已完成</h3>
                                        {getLogsByDate(date).length === 0 ? <p className="text-center text-slate-400 text-sm py-4">今天還沒有紀錄</p> : 
                                            <LogGroup logs={getLogsByDate(date)} onDelete={initiateDelete} />
                                        }
                                    </div>
                                    </>
                                ) : (
                                    <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-lg border border-slate-100 dark:border-slate-700 overflow-hidden">
                                        <div className="p-4 bg-slate-50 dark:bg-slate-700/50 border-b border-slate-100 dark:border-slate-700 flex justify-between text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">
                                            <div className="w-10 text-center">組數</div>
                                            <div className="flex-1 text-center">{workoutType === 'strength' ? 'kg' : (workoutType === 'cardio' ? '分' : 'kg')}</div>
                                            <div className="flex-1 text-center">{workoutType === 'strength' ? '下' : (workoutType === 'cardio' ? 'km' : '秒/秒')}</div>
                                            <div className="w-10 text-center">狀態</div>
                                        </div>
                                        
                                        <div className="divide-y divide-slate-100 dark:divide-slate-700">
                                            {currentSets.map((set, idx) => (
                                                <div key={set.id} className={`p-3 flex items-center justify-between transition-all ${set.completed ? 'bg-green-50 dark:bg-green-900/10' : ''}`}>
                                                    <div className="w-10 text-center font-mono font-bold text-slate-400">{idx + 1}</div>
                                                    <div className="flex-1 px-1">
                                                        <input type="number" value={workoutType === 'cardio' ? set.duration : set.weight} onChange={(e) => updateSet(idx, workoutType === 'cardio' ? 'duration' : 'weight', e.target.value)} placeholder="-" disabled={set.completed} className="w-full bg-slate-100 dark:bg-slate-900 dark:text-white rounded-lg py-2 text-center font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 disabled:bg-transparent" />
                                                    </div>
                                                    <div className="flex-1 px-1">
                                                        {workoutType === 'interval' ? (
                                                            <div className="flex gap-1">
                                                                <input type="number" value={set.workTime} onChange={(e) => updateSet(idx, 'workTime', e.target.value)} className="w-full bg-slate-100 dark:bg-slate-900 dark:text-white rounded-lg py-2 text-center font-bold text-xs" placeholder="做" disabled={set.completed} />
                                                                <input type="number" value={set.restTime} onChange={(e) => updateSet(idx, 'restTime', e.target.value)} className="w-full bg-slate-100 dark:bg-slate-900 dark:text-white rounded-lg py-2 text-center font-bold text-xs" placeholder="休" disabled={set.completed} />
                                                            </div>
                                                        ) : (
                                                            <input type="number" value={workoutType === 'cardio' ? set.distance : set.reps} onChange={(e) => updateSet(idx, workoutType === 'cardio' ? 'distance' : 'reps', e.target.value)} placeholder="-" disabled={set.completed} className="w-full bg-slate-100 dark:bg-slate-900 dark:text-white rounded-lg py-2 text-center font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 disabled:bg-transparent" />
                                                        )}
                                                    </div>
                                                    <div className="w-10 flex justify-center">
                                                        <button onClick={() => set.completed ? deleteSetRow(idx) : toggleSetCompletion(idx)} className={`w-8 h-8 rounded-full flex items-center justify-center transition-all shrink-0 ${set.completed ? 'bg-green-500 text-white shadow-green-200' : 'bg-slate-200 dark:bg-slate-600 text-slate-400 dark:text-slate-400'}`}>
                                                            {set.completed ? <Icons.Check className="w-5 h-5" /> : <div className="w-3 h-3 rounded-sm bg-current opacity-50 shrink-0"></div>}
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={addNewSetRow} className="w-full py-4 bg-slate-50 dark:bg-slate-700/30 text-blue-600 dark:text-blue-400 font-bold text-sm hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors flex items-center justify-center"><Icons.Plus className="w-4 h-4 mr-2" /> 新增一組</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <CalendarView logs={logs} selectedDate={historyDate} onSelectDate={setHistoryDate} />
                                <div className="space-y-3">
                                    {getLogsByDate(historyDate).length === 0 ? <p className="text-center text-slate-400 text-sm py-4">本日無紀錄</p> : <LogGroup logs={getLogsByDate(historyDate)} onDelete={initiateDelete} />}
                                </div>
                            </div>
                        )}

                        {activeTab === 'analysis' && <ChartView logs={logs} isDarkMode={darkMode} />}

                        {activeTab === 'settings' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden">
                                    <div className="p-5 bg-slate-50 dark:bg-slate-700/50 border-b border-slate-100 dark:border-slate-700"><h2 className="font-bold text-slate-800 dark:text-white flex items-center"><Icons.Settings className="w-5 h-5 mr-2 text-slate-500" /> 資料管理</h2></div>
                                    <div className="p-5 space-y-6">
                                        <div><h3 className="text-sm font-bold text-slate-700 dark:text-slate-200 mb-2">備份資料 (匯出)</h3><button onClick={handleExport} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-2xl flex items-center justify-center transition-colors shadow-lg shadow-emerald-200 dark:shadow-none"><Icons.Download className="w-5 h-5 mr-2" /> 下載備份檔</button></div>
                                        <div className="border-t border-slate-100 dark:border-slate-700"></div>
                                        <div><h3 className="text-sm font-bold text-slate-700 dark:text-slate-200 mb-2">還原資料 (匯入)</h3><input type="file" ref={fileInputRef} onChange={handleFileChange} accept=".json" className="hidden" /><button onClick={handleImportClick} className="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3.5 rounded-2xl flex items-center justify-center transition-colors shadow-lg shadow-amber-200 dark:shadow-none"><Icons.Upload className="w-5 h-5 mr-2" /> 選擇備份檔匯入</button>{importMsg && <div className="mt-4 text-center text-sm font-bold text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 py-2 rounded-xl animate-pulse">{importMsg}</div>}</div>
                                    </div>
                                </div>
                                <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-red-100 dark:border-red-900/30 overflow-hidden">
                                    <div className="p-5 bg-red-50 dark:bg-red-900/10 border-b border-red-100 dark:border-red-900/30"><h2 className="font-bold text-red-800 dark:text-red-400 flex items-center"><Icons.AlertCircle className="w-5 h-5 mr-2" /> 危險區域</h2></div>
                                    <div className="p-5"><button onClick={initiateClearAll} className="w-full border-2 border-red-100 dark:border-red-900 text-red-500 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 font-bold py-3.5 rounded-2xl flex items-center justify-center transition-colors">清空所有資料</button></div>
                                </div>
                                <div className="text-center text-xs text-slate-400 mt-8">Fitness Tracker V15.4 (Layout Fixed)</div>
                            </div>
                        )}
                    </main>

                    <nav className="bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 fixed bottom-0 left-0 right-0 z-30 pb-safe transition-colors">
                        <div className="max-w-md mx-auto flex justify-between p-2 w-full">
                            <button onClick={() => setActiveTab('record')} className={`flex flex-col items-center justify-center p-2 rounded-xl flex-1 transition-all ${activeTab === 'record' ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20' : 'text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700'}`}><Icons.Plus className="w-6 h-6 mb-1" /><span className="text-[10px] sm:text-xs font-bold">新增</span></button>
                            <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center justify-center p-2 rounded-xl flex-1 transition-all ${activeTab === 'history' ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20' : 'text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700'}`}><Icons.CalendarDays className="w-6 h-6 mb-1" /><span className="text-[10px] sm:text-xs font-bold">歷史</span></button>
                            <button onClick={() => setActiveTab('analysis')} className={`flex flex-col items-center justify-center p-2 rounded-xl flex-1 transition-all ${activeTab === 'analysis' ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20' : 'text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700'}`}><Icons.Chart className="w-6 h-6 mb-1" /><span className="text-[10px] sm:text-xs font-bold">分析</span></button>
                            <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center justify-center p-2 rounded-xl flex-1 transition-all ${activeTab === 'settings' ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20' : 'text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700'}`}><Icons.Settings className="w-6 h-6 mb-1" /><span className="text-[10px] sm:text-xs font-bold">設定</span></button>
                        </div>
                    </nav>

                    {showSuccess && <div className="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-slate-800 dark:bg-white text-white dark:text-slate-900 px-6 py-3 rounded-full shadow-2xl flex items-center animate-bounce z-50 font-bold"><span className="mr-2 text-green-400 dark:text-green-600">✓</span> 已儲存</div>}

                    {deleteTargetId && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={cancelDelete}></div>
                            <div className="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-2xl w-full max-w-xs relative z-10 animate-in zoom-in-95 duration-200">
                                <div className="text-center">
                                    <div className="w-12 h-12 bg-red-100 dark:bg-red-900/30 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icons.Trash2 className="w-6 h-6" /></div>
                                    <h3 className="text-lg font-bold text-slate-800 dark:text-white mb-2">{isClearingAll ? '清空所有資料？' : '刪除這條紀錄？'}</h3>
                                    <p className="text-sm text-slate-500 dark:text-slate-400 mb-6">此動作無法復原，請確認是否繼續。</p>
                                    <div className="flex gap-3">
                                        <button onClick={cancelDelete} className="flex-1 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700 transition-colors">取消</button>
                                        <button onClick={confirmDelete} className="flex-1 py-3 rounded-xl font-bold bg-red-500 hover:bg-red-600 text-white shadow-lg shadow-red-200 dark:shadow-none transition-colors">確認刪除</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FitnessApp />);
    </script>
</body>
</html>
